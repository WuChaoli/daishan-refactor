# RAGFlow SDK 默认配置文件
#
# 使用方法：
# 1. 复制此文件并重命名为 config.yaml
# 2. 修改配置项
# 3. 初始化客户端时指定配置文件路径：
#    client = RAGFlowClient.from_config("config.yaml")

# API 配置
api:
  # API 基础 URL（必需）
  base_url: "http://localhost:80/v1"
  # API 密钥（必需）
  api_key: ""
  # 请求超时时间（秒）
  timeout: 30
  # 最大重试次数
  max_retries: 3
  # 是否验证 SSL 证书
  verify_ssl: true

# 请求配置
request:
  # 默认每页数量
  default_page_size: 10
  # 最大每页数量
  max_page_size: 1000

# 日志配置
logging:
  # 是否启用日志
  enabled: false
  # 日志级别: DEBUG, INFO, WARNING, ERROR
  level: INFO
