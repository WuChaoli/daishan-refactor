  host: "0.0.0.0"
  port: 11028

# ============================================================
# 日志配置
# ============================================================
logging:
  log_dir: "logs"
  max_bytes: 10485760       # 10MB
  backup_count: 5
  total_size_limit: 524288000  # 500MB

