# 岱山意图识别服务配置文件
# 敏感信息（API Keys）请在 .env 文件中配置

# ============================================================
# RAGFlow 配置
# ============================================================
ragflow:
  # API Key 从环境变量读取
  base_url: "http://172.16.11.60:8081/api/v1"
  timeout: 30
  max_retries: 3

  # 知识库映射: 知识库名 → 意图类型（业务配置）
  database_mapping:
    岱山-指令集-260129: 1       # 指令表 → 明确指令
    岱山-数据库问题-5张表: 2  # 统计表 → 统计类
    # 可根据需要添加更多知识库

# ============================================================
# 意图判断参数（业务配置）
# ============================================================
intent:
  similarity_threshold: 0.5  # 相似度阈值 (0-1)
  top_k_per_database: 10      # 每个知识库返回的 Top-K 结果数
  default_type: 0             # 默认意图类型 (降级时使用)

# ============================================================
# 服务器配置
# ============================================================
server:
  host: "0.0.0.0"
  port: 11029

# ============================================================
# 日志配置
# ============================================================
logging:
  log_dir: "logs"
  max_bytes: 10485760   # 10MB
  backup_count: 5
  total_size_limit: 524288000  # 500MB

# ============================================================
# Dify 配置
# ============================================================
dify:
  base_url: "http://172.16.11.60/v1"
  timeout: 30
  max_retries: 3

# ============================================================
# 流式聊天配置（/api/stream-chat 接口）
# ============================================================
stream_chat:
  # Dify Chat API 配置（用于流式聊天）
  base_url: "http://172.16.11.60/v1"
  endpoint: "/chat-messages"
  timeout: 30.0
  max_retry_attempts: 2
  retry_delay: 1.0