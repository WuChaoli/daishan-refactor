# ============================================================
# 意图判断参数（业务配置）
# ============================================================
intent:
  similarity_threshold: 0.5
  top_k_per_database: 10
  # 可选覆盖项：不设置则继承 ragflow.vector_similarity_weight
  # vector_similarity_weight: 0.7
  default_type: 0
  fixed_question_similarity_threshold: 0.6
  fixed_question_direct_threshold: 0.7
  fixed_question_top_k: 5
  fixed_question_table_name: "岱山-指令集-固定问题-0311"

# ============================================================
# 服务器配置
# ============================================================
server:
  host: "0.0.0.0"
  port: 11027

# ============================================================
# 日志配置
# ============================================================
logging:
  log_dir: "logs"
  max_bytes: 10485760       # 10MB
  backup_count: 5
  total_size_limit: 524288000  # 500MB

# ============================================================
# Query 清理聊天配置（企业名称清理）
# ============================================================
query_chat:
  # 是否启用 query 清理功能（可由 QUERY_CHAT_ENABLED 覆盖）
  enabled: true
  # 敏感值建议通过环境变量覆盖：
  # QUERY_CHAT_API_KEY / QUERY_CHAT_BASE_URL / QUERY_CHAT_MODEL
  api_key: "xiyunmu"
  base_url: "http://172.16.11.61:50016/v1"
  model: "Qwen2.5-7B-Instruct"
  timeout: 20
  temperature: 0.0

# ============================================================
# 意图分类配置（粗粒度分类）
# ============================================================
intent_classification:
  # 是否启用意图分类功能（可由 INTENT_CLASSIFICATION_ENABLED 覆盖）
  enabled: false
