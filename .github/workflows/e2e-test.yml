name: E2E Tests

on:
  push:
    branches: [main, master]
    paths:
      - 'src/**'
      - 'tests/e2e/**'
      - '.github/workflows/e2e-test.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'src/**'
      - 'tests/e2e/**'
      - '.github/workflows/e2e-test.yml'
  workflow_dispatch:
    inputs:
      filter_type:
        description: 'Filter by intent type (1-3, leave empty for all)'
        required: false
        default: ''

env:
  TEST_TIMEOUT: '60'
  TEST_USER_ID: 'test_e2e_ci'

jobs:
  e2e:
    name: Run E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ============================================================
      # Checkout
      # ============================================================
      - name: Checkout code
        uses: actions/checkout@v4

      # ============================================================
      # Setup Docker Buildx
      # ============================================================
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ============================================================
      # Create environment file
      # ============================================================
      - name: Create .env file
        run: |
          cat > .env << 'EOF'
          # Dify API Configuration
          DIFY_API_KEY=${{ secrets.DIFY_API_KEY }}
          DIFY_BASE_URL=${{ secrets.DIFY_BASE_URL || 'https://api.dify.ai/v1' }}

          # RAGFlow API Configuration
          RAGFLOW_API_KEY=${{ secrets.RAGFLOW_API_KEY }}
          RAGFLOW_BASE_URL=${{ secrets.RAGFLOW_BASE_URL || 'http://localhost:9380' }}

          # Database Configuration
          DATABASE_URL=${{ secrets.DATABASE_URL }}

          # Redis Configuration (if used)
          REDIS_URL=${{ secrets.REDIS_URL || '' }}

          # Logging
          LOG_LEVEL=${{ secrets.LOG_LEVEL || 'INFO' }}
          LOG_CONSOLE_OUTPUT=true

          # Environment
          ENVIRONMENT=test
          EOF

      # ============================================================
      # Run E2E Tests
      # ============================================================
      - name: Run E2E Tests
        run: |
          echo "Starting E2E tests..."
          
          # Set filter type if provided
          if [ -n "${{ github.event.inputs.filter_type }}" ]; then
            export FILTER_TYPE=${{ github.event.inputs.filter_type }}
            echo "Running tests for intent type: $FILTER_TYPE"
          fi
          
          # Run tests using Docker Compose
          docker compose -f tests/e2e/docker-compose.test.yml up --build --abort-on-container-exit
          
          # Capture exit code
          EXIT_CODE=$?
          
          # Cleanup
          echo "Cleaning up..."
          docker compose -f tests/e2e/docker-compose.test.yml down --volumes --remove-orphans
          
          # Exit with test result
          exit $EXIT_CODE

      # ============================================================
      # Upload Test Report
      # ============================================================
      - name: Upload Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-report-${{ github.run_id }}
          path: tests/e2e/reports/e2e_report.json
          retention-days: 30
          if-no-files-found: warn

      # ============================================================
      # Upload Test Logs
      # ============================================================
      - name: Upload Test Logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-logs-${{ github.run_id }}
          path: |
            tests/e2e/reports/
            !tests/e2e/reports/*.json
          retention-days: 7
          if-no-files-found: ignore

      # ============================================================
      # PR Comment with Results (Optional Enhancement)
      # ============================================================
      - name: Comment PR with Test Results
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = 'tests/e2e/reports/e2e_report.json';
            
            let summary = '';
            try {
              const report = JSON.parse(fs.readFileSync(path, 'utf8'));
              const { summary: s, timing } = report;
              summary = `## E2E Test Results\n\n` +
                `**Status:** ${s.failed === 0 ? '✅ PASSED' : '❌ FAILED'}\n\n` +
                `| Metric | Value |\n` +
                `|--------|-------|\n` +
                `| Total | ${s.total} |\n` +
                `| Passed | ${s.passed} |\n` +
                `| Failed | ${s.failed} |\n` +
                `| Pass Rate | ${s.pass_rate} |\n` +
                `| Duration | ${timing.duration_seconds.toFixed(1)}s |\n`;
            } catch (e) {
              summary = '## E2E Test Results\n\n⚠️ Could not parse test report. Check the workflow logs for details.';
            }
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary
            });

      # ============================================================
      # Cleanup (Always)
      # ============================================================
      - name: Cleanup
        if: always()
        run: |
          docker compose -f tests/e2e/docker-compose.test.yml down --volumes --remove-orphans 2>/dev/null || true
          docker system prune -f --volumes 2>/dev/null || true
